<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exchange Rate Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: transparent;
    }

    .widget {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      padding: 18px;
      border-radius: 18px;
      background: #4a4a4a;
      color: white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
      text-align: center;
      font-weight: 600;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      opacity: 0.9;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #f3f3f3;
      color: #222;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #333;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }

    button:hover {
      opacity: 0.95;
    }

    .result {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      font-size: 14px;
      text-align: center;
      min-height: 44px;
    }

    .small {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="widget">
    <h2>Exchange Rate Calculator</h2>

    <div class="field">
      <label for="amount">Amount</label>
      <input type="number" id="amount" value="1" min="0" step="0.01" />
    </div>

    <div class="row">
      <div class="field">
        <label for="fromCurrency">From</label>
        <select id="fromCurrency">
          <option value="USD">USD</option>
          <option value="EUR" selected>EUR</option>
          <option value="GBP">GBP</option>
          <option value="CAD">CAD</option>
          <option value="AUD">AUD</option>
          <option value="JPY">JPY</option>
        </select>
      </div>

      <div class="field">
        <label for="toCurrency">To</label>
        <select id="toCurrency">
          <option value="USD" selected>USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="CAD">CAD</option>
          <option value="AUD">AUD</option>
          <option value="JPY">JPY</option>
        </select>
      </div>
    </div>

    <button onclick="convertCurrency()">Convert</button>

    <div class="result" id="result">Enter an amount and click Convert</div>
    <div class="small" id="rateInfo"></div>
  </div>

  <script>
    async function convertCurrency() {
      const amount = parseFloat(document.getElementById("amount").value);
      const from = document.getElementById("fromCurrency").value;
      const to = document.getElementById("toCurrency").value;
      const result = document.getElementById("result");
      const rateInfo = document.getElementById("rateInfo");

      if (isNaN(amount) || amount <= 0) {
        result.textContent = "Please enter a valid amount.";
        rateInfo.textContent = "";
        return;
      }

      if (from === to) {
        result.textContent = `${amount.toFixed(2)} ${from} = ${amount.toFixed(2)} ${to}`;
        rateInfo.textContent = "Same currency selected.";
        return;
      }

      result.textContent = "Converting...";
      rateInfo.textContent = "";

      try {
        const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
        const data = await response.json();

        if (!data.rates || !data.rates[to]) {
          result.textContent = "Conversion failed. Try again.";
          return;
        }

        const rate = data.rates[to];
        const converted = amount * rate;

        result.textContent = `${amount.toFixed(2)} ${from} = ${converted.toFixed(2)} ${to}`;
        rateInfo.textContent = `1 ${from} = ${rate.toFixed(4)} ${to}`;
      } catch (error) {
        result.textContent = "Unable to fetch exchange rate.";
        rateInfo.textContent = "";
      }
    }
  </script>
</body>
</html>
