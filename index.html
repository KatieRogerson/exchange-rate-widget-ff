<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exchange Rate</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      margin: 0;
      padding: 24px;
      background: transparent;
    }

    .widget {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      padding: 22px;
      border-radius: 8px;
      background: #f9f8f7;
      color: #555350;
      border: 1px solid #f0efed;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h2 {
      margin: 0 0 18px 0;
      font-size: 20px;
      text-align: center;
      font-weight: 500;
      font-style: italic;
      letter-spacing: 0.2px;
      color: #000000;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #555350;
      font-weight: 500;
      opacity: 0.72;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #f0efed;
      background: #f0efed;
      color: #555350;
      font-size: 15px;
      outline: none;
      box-shadow: none;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      margin-top: 8px;
      font-weight: 500;
      cursor: pointer;
      background: #f0efed;
    }

    button:hover {
      background: #ffffff;
    }

    .result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #f0efed;
      background: #ffffff;
      text-align: center;
      color: #555350;
      min-height: 48px;
    }

    .small {
      margin-top: 8px;
      font-size: 12px;
      color: #555350;
      opacity: 0.65;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      .widget {
        background: #191919;
        color: #d6d3cf;
        border: 1px solid #2a2a2a;
      }

      h2 {
        color: #f5f5f5;
      }

      label {
        color: #d6d3cf;
        opacity: 0.72;
      }

      input,
      select,
      button {
        background: #232323;
        border: 1px solid #2f2f2f;
        color: #e7e4df;
      }

      button:hover {
        background: #2a2a2a;
      }

      .result {
        background: #202020;
        border: 1px solid #2f2f2f;
        color: #d6d3cf;
      }

      .small {
        color: #d6d3cf;
        opacity: 0.6;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <h2>Exchange Rate</h2>

    <div class="field">
      <label for="amount">Amount</label>
      <input type="number" id="amount" value="1" min="0" step="0.01" />
    </div>

    <div class="row">
      <div class="field">
        <label for="fromCurrency">From</label>
        <select id="fromCurrency">
          <option value="USD">USD</option>
          <option value="EUR" selected>EUR</option>
          <option value="GBP">GBP</option>
          <option value="CAD">CAD</option>
          <option value="AUD">AUD</option>
          <option value="JPY">JPY</option>
        </select>
      </div>

      <div class="field">
        <label for="toCurrency">To</label>
        <select id="toCurrency">
          <option value="USD" selected>USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="CAD">CAD</option>
          <option value="AUD">AUD</option>
          <option value="JPY">JPY</option>
        </select>
      </div>
    </div>

    <button onclick="convertCurrency()">Convert</button>

    <div class="result" id="result">Enter an amount and click Convert</div>
    <div class="small" id="rateInfo"></div>
  </div>

  <script>
    async function convertCurrency() {
      const amount = parseFloat(document.getElementById("amount").value);
      const from = document.getElementById("fromCurrency").value;
      const to = document.getElementById("toCurrency").value;
      const result = document.getElementById("result");
      const rateInfo = document.getElementById("rateInfo");

      if (isNaN(amount) || amount <= 0) {
        result.textContent = "Please enter a valid amount.";
        rateInfo.textContent = "";
        return;
      }

      if (from === to) {
        result.textContent =
          amount.toFixed(2) + " " + from + " = " + amount.toFixed(2) + " " + to;
        rateInfo.textContent = "Same currency selected.";
        return;
      }

      result.textContent = "Converting...";
      rateInfo.textContent = "";

      try {
        const response = await fetch("https://open.er-api.com/v6/latest/" + from);
        const data = await response.json();

        if (!data.rates || !data.rates[to]) {
          result.textContent = "Conversion failed. Try again.";
          rateInfo.textContent = "";
          return;
        }

        const rate = data.rates[to];
        const converted = amount * rate;

        result.textContent =
          amount.toFixed(2) + " " + from + " = " + converted.toFixed(2) + " " + to;
        rateInfo.textContent =
          "1 " + from + " = " + rate.toFixed(4) + " " + to;
      } catch (error) {
        result.textContent = "Unable to fetch exchange rate.";
        rateInfo.textContent = "";
      }
    }
  </script>
</body>
</html>
