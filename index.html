<style>
  * {
    box-sizing: border-box;
    font-family: Georgia, "Times New Roman", serif;
  }

  body {
    margin: 0;
    padding: 24px;
    background: transparent;
  }

  .widget {
    width: 100%;
    max-width: 340px;
    margin: 0 auto;
    padding: 22px;
    border-radius: 24px;
    background: #f7f5f2; /* lighter, more airy */
    color: #5c534a;
    border: 1px solid #ece8e2;
    box-shadow: none; /* remove heaviness */
  }

  h2 {
    margin: 0 0 18px 0;
    font-size: 20px;
    text-align: center;
    font-weight: 500;
    font-style: italic;
    color: #4f463f;
  }

  .field {
    margin-bottom: 12px;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #9a9085;
    font-weight: 500;
  }

  input,
  select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 18px;
    border: 1px solid #e9e4dd;
    background: #f3f0eb; /* closer to widget bg */
    color: #5c534a;
    font-size: 15px;
    outline: none;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  button {
    width: 100%;
    padding: 13px;
    margin-top: 8px;
    border-radius: 18px;
    border: 1px solid #e3ded6;
    background: #f1ede7; /* NOT darker than inputs */
    color: #4f463f;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  button:hover {
    background: #ebe6df;
  }

  .result {
    margin-top: 16px;
    padding: 14px;
    border-radius: 18px;
    background: #f3efe9;
    border: 1px solid #e6e0d8;
    font-size: 15px;
    text-align: center;
    color: #6a6056;
  }

  .small {
    font-size: 12px;
    color: #a39a90;
    margin-top: 6px;
    text-align: center;
  }
</style>
