<style>
  * {
    box-sizing: border-box;
    font-family: Georgia, "Times New Roman", serif;
  }

  body {
    margin: 0;
    padding: 0;
    background: transparent;
  }

  .widget {
    width: 100%;
    max-width: 340px;
    margin: 0 auto;
    padding: 22px;
    border-radius: 24px;
    background: #f5f3ef;
    color: #4b443d;
    box-shadow: 0 8px 24px rgba(120, 108, 96, 0.08);
    border: 1px solid #ece7e0;
  }

  h2 {
    margin: 0 0 18px 0;
    font-size: 19px;
    text-align: center;
    font-weight: 600;
    color: #433c35;
  }

  .field {
    margin-bottom: 12px;
  }

  label {
    display: block;
    margin-bottom: 7px;
    font-size: 13px;
    color: #8b8177;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  input,
  select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 16px;
    border: 1px solid #e6dfd7;
    background: #ebe7e1;
    color: #4b443d;
    font-size: 15px;
    outline: none;
    box-shadow: none;
  }

  input::placeholder {
    color: #a49a8f;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  button {
    width: 100%;
    padding: 13px;
    margin-top: 8px;
    border: 1px solid #ddd5cc;
    border-radius: 16px;
    background: #e7e1d8;
    color: #433c35;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  button:hover {
    background: #ded7ce;
  }

  button:active {
    transform: scale(0.99);
  }

  .result {
    margin-top: 16px;
    padding: 14px;
    border-radius: 16px;
    background: #ede8e1;
    border: 1px solid #e2dbd2;
    font-size: 15px;
    text-align: center;
    min-height: 48px;
    color: #5a5148;
  }

  .small {
    font-size: 12px;
    color: #9a9085;
    margin-top: 8px;
    text-align: center;
  }
</style>
